<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Técnicas para multiplicar · Calcumat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root{
            --ink:#06233f;
            --muted:#64748b;
            --cyan:#0891b2;
            --teal:#14b8a6;
            --green:#16a34a;
            --red:#ef4444;
            --paper:rgba(255,255,255,.84);
            --shadow:0 24px 70px -48px rgba(15,23,42,.72);
        }

        .multi-app{
            min-height:100vh;
            color:var(--ink);
            background:linear-gradient(145deg,#f3fafc 0%,#eef7fa 48%,#fff9f2 100%);
        }
        .multi-app::before{
            content:"";
            position:absolute;
            inset:auto auto -22rem 50%;
            width:64rem;
            height:64rem;
            transform:translateX(-50%);
            background:radial-gradient(circle,rgba(34,211,238,.18),rgba(34,211,238,.06) 36%,transparent 66%);
            pointer-events:none;
        }
        .multi-app::after{
            content:"";
            position:absolute;
            left:50%;
            top:58%;
            width:58rem;
            height:58rem;
            transform:translate(-50%,-50%);
            background:url('assets/calcumat-hands-bg.png') center/contain no-repeat;
            opacity:.06;
            filter:saturate(1.08);
            pointer-events:none;
        }

        .multi-fade{ animation:multiFade .34s ease both; }
        @keyframes multiFade{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }

        .phase-stage{
            display:grid;
            width:100%;
            max-width:66rem;
            align-items:center;
            gap:clamp(2rem,5vw,4.4rem);
        }
        .phase-stage.is-two{
            grid-template-columns:minmax(16rem,.78fr) minmax(22rem,1fr);
        }
        .phase-stage.is-final{
            max-width:66rem;
            grid-template-columns:minmax(17rem,.82fr) minmax(20rem,1fr);
            gap:clamp(2.5rem,5vw,4.8rem);
        }
        .phase-copy{
            display:grid;
            justify-items:center;
            gap:clamp(1.35rem,4vw,2.75rem);
            text-align:center;
        }
        .phase-stage.is-final .phase-copy{
            justify-items:start;
            gap:clamp(1.7rem,3.6vw,3.2rem);
            text-align:left;
        }
        .phase-kicker{
            margin:0 0 .4rem;
            color:#0e7490;
            font-size:.72rem;
            font-weight:760;
            letter-spacing:.16em;
            text-transform:uppercase;
        }
        .phase-question{
            margin:0;
            max-width:30rem;
            color:var(--ink);
            font-size:clamp(1.25rem,2vw,1.72rem);
            font-weight:650;
            line-height:1.15;
            letter-spacing:-.04em;
        }
        .phase-intro{
            margin:0 0 .55rem;
            color:#64748b;
            font-size:clamp(.95rem,1.35vw,1.08rem);
            font-weight:620;
            line-height:1.35;
            letter-spacing:-.02em;
        }
        .calc-expression{
            display:flex;
            align-items:center;
            justify-content:center;
            flex-wrap:wrap;
            gap:clamp(.7rem,1.4vw,1.1rem);
            color:#020617;
            font-size:clamp(3.55rem,6.45vw,6.25rem);
            line-height:1;
            font-weight:430;
            letter-spacing:-.055em;
        }
        .calc-expression.is-result{
            justify-content:flex-start;
            flex-wrap:nowrap;
            gap:clamp(.52rem,1vw,.82rem);
            width:max-content;
            max-width:100%;
            white-space:nowrap;
            font-size:clamp(2.72rem,4.65vw,4.8rem);
        }
        .calc-expression.is-known-result{
            flex-wrap:nowrap;
            gap:clamp(.55rem,1vw,.85rem);
            width:max-content;
            max-width:100%;
            white-space:nowrap;
            font-size:clamp(3.15rem,5.75vw,5.62rem);
        }
        .calc-expression strong{
            color:#020617;
            font-weight:540;
        }
        .system-card{
            display:grid;
            gap:1.45rem;
            width:min(100%,29rem);
            border:0;
            border-radius:0;
            background:transparent;
            padding:.35rem 0 0;
            color:#0e7490;
        }
        .system-card p{
            margin:0;
            color:#475569;
            font-size:clamp(.9rem,1.2vw,1rem);
            font-weight:650;
            line-height:1.35;
            letter-spacing:-.02em;
        }
        .system-card .system-line{
            display:flex;
            flex-wrap:wrap;
            align-items:center;
            gap:.4rem .65rem;
            color:#64748b;
        }
        .system-step{
            display:grid;
            gap:.55rem;
        }
        .system-step:last-child{
            gap:.48rem;
        }
        .system-card .system-label{
            display:block;
        }
        .system-card .system-expression{
            display:flex;
            flex-wrap:nowrap;
            align-items:center;
            gap:.6rem;
            white-space:nowrap;
        }
        .system-card .big{
            color:#64748b;
            font-size:clamp(1.75rem,3.05vw,2.75rem);
            font-weight:430;
            line-height:1;
            letter-spacing:-.055em;
        }
        .system-card .big.is-phrase{
            font-size:clamp(1.35rem,2.35vw,2.15rem);
            letter-spacing:-.045em;
        }
        .system-card .minus{ color:var(--red); font-weight:780; }
        .system-card .plus{ color:var(--green); font-weight:780; }

        .dot-matrix{
            --dot:clamp(1.34rem,3vw,2.65rem);
            --gap:clamp(.26rem,.62vw,.52rem);
            --divider-gap:clamp(.95rem,2.1vw,1.55rem);
            position:relative;
            display:grid;
            grid-template-columns:repeat(var(--columns),var(--dot));
            grid-auto-rows:auto;
            gap:var(--gap);
            padding:.35rem;
            touch-action:manipulation;
        }
        .phase-stage.is-final .dot-matrix{
            --dot:clamp(1.04rem,2.28vw,2.12rem);
            --gap:clamp(.18rem,.42vw,.35rem);
            --divider-gap:clamp(.78rem,1.55vw,1.2rem);
        }
        .matrix-stack{
            display:grid;
            justify-items:center;
            gap:clamp(.85rem,1.8vw,1.35rem);
        }
        .phase-stage.is-final .matrix-stack.has-progression{
            gap:clamp(.85rem,1.4vw,1.25rem);
            transform:none;
        }
        .progression-matrix{
            --dot:clamp(.86rem,1.72vw,1.48rem);
            --gap:clamp(.14rem,.34vw,.28rem);
            display:grid;
            grid-template-columns:repeat(var(--columns),var(--dot));
            gap:var(--gap);
            padding:.12rem;
        }
        .double-build-stack{
            --build-dot:clamp(1.34rem,3vw,2.65rem);
            --build-gap:clamp(.26rem,.62vw,.52rem);
            display:grid;
            width:max-content;
            max-width:100%;
            justify-items:center;
            gap:var(--build-gap);
        }
        .double-build-stack .progression-matrix{
            --dot:var(--build-dot);
            --gap:var(--build-gap);
        }
        .phase-stage.is-final .double-build-stack{
            --build-dot:clamp(1.12rem,2.25vw,2.1rem);
            --build-gap:clamp(.2rem,.44vw,.38rem);
            gap:clamp(.58rem,1vw,.86rem);
        }
        .double-build-separator{
            width:100%;
            height:0;
            border-top:3px solid rgba(14,116,144,.82);
        }
        .double-build-separator.is-dashed{
            border-top:3px dashed rgba(22,101,52,.9);
        }
        .dot{
            display:block;
            width:var(--dot);
            aspect-ratio:1;
            border:2px solid #fb7185;
            border-radius:999px;
            background:rgba(255,255,255,.9);
            box-shadow:0 12px 24px -20px rgba(15,23,42,.52);
        }
        .dot.is-filled{
            border-color:transparent;
            background:linear-gradient(145deg,#fb7185,#ef4444);
            box-shadow:inset 0 10px 18px rgba(255,255,255,.18),0 12px 24px -20px rgba(15,23,42,.52);
        }
        .dot.is-added{
            border-color:transparent;
            background:linear-gradient(145deg,#4ade80,#16a34a);
            box-shadow:inset 0 10px 18px rgba(255,255,255,.18),0 12px 24px -20px rgba(15,23,42,.52);
        }
        .dot.is-empty{ opacity:.78; }
        .matrix-divider{
            position:relative;
            grid-column:1 / -1;
            height:var(--divider-gap);
        }
        .matrix-divider::before{
            content:"";
            position:absolute;
            left:calc(var(--dot) * -.32);
            right:calc(var(--dot) * -.32);
            top:50%;
            height:2px;
            border-radius:999px;
            background:rgba(14,116,144,.55);
            transform:translateY(-50%);
        }

        .family-table{
            position:relative;
            overflow:hidden;
            justify-self:center;
            width:clamp(10rem,13vw,11rem);
            border:0;
            border-radius:0;
            background:transparent;
            padding:0;
            box-shadow:none;
        }
        .table-row{
            position:relative;
            display:grid;
            grid-template-columns:1fr minmax(1.95rem,.32fr);
            min-height:2.15rem;
            align-items:center;
            border-radius:.66rem;
            color:var(--ink);
            font-size:clamp(.9rem,1.35vw,1.12rem);
            font-weight:650;
            letter-spacing:-.04em;
        }
        .table-row + .table-row{ margin-top:.1rem; }
        .table-cell{
            padding:.22rem .34rem;
            white-space:nowrap;
        }
        .table-cell:last-child{
            display:grid;
            place-items:center;
            min-height:1.82rem;
            border-radius:.5rem;
            background:rgba(248,250,252,.88);
            font-weight:760;
        }
        .table-row.is-target{
            background:rgba(207,250,254,.72);
            color:#0e7490;
        }
        .table-row.is-known{
            background:rgba(255,255,255,.92);
        }
        .related-rows.is-add .table-row.is-known{
            margin-bottom:.1rem;
        }
        .related-rows{
            position:relative;
            padding-right:1rem;
        }
        .related-rows.has-three{
            padding-right:1.25rem;
        }
        .related-rows .table-row + .table-row{ margin-top:.1rem; }
        .related-rows .table-cell:last-child{
            min-width:2rem;
        }
        .subtract-note{
            position:absolute;
            right:.86rem;
            top:47%;
            color:#ef4444;
            font-size:.96rem;
            font-weight:850;
            transform:translateY(-50%);
            z-index:2;
        }
        .subtract-note.is-add{
            top:53%;
            color:#16a34a;
        }
        .subtract-note.is-double{
            top:53%;
            color:#16a34a;
        }
        .subtract-note.step-one{ top:32%; }
        .subtract-note.step-two{ top:68%; }
        .table-arrow{
            position:absolute;
            right:2.1rem;
            top:50%;
            width:1.22rem;
            height:2.75rem;
            overflow:hidden;
            pointer-events:none;
            z-index:1;
            transform:translateY(-50%);
        }
        .table-arrow.step-one{ top:32%; }
        .table-arrow.step-two{ top:68%; }
        .table-arrow path{
            fill:none;
            stroke:#ef4444;
            stroke-width:4.4;
            stroke-linecap:round;
            stroke-linejoin:round;
        }
        .table-arrow polygon{ fill:#ef4444; }
        .table-arrow.is-add path{ stroke:#16a34a; }
        .table-arrow.is-add polygon{ fill:#16a34a; }
        .table-arrow.is-double path{ stroke:#16a34a; }
        .table-arrow.is-double polygon{ fill:#16a34a; }

        .nine-system-stage{
            display:grid;
            width:100%;
            height:100%;
            min-height:28.5rem;
            place-items:center;
        }
        .nine-system-visual{
            --dot:clamp(1.5rem,3.25vw,2.28rem);
            --gap:clamp(.3rem,.66vw,.49rem);
            display:grid;
            width:min(100%,49rem);
            grid-template-columns:auto auto auto auto auto;
            grid-template-rows:auto auto;
            align-items:center;
            justify-content:center;
            justify-items:center;
            column-gap:var(--system-column-gap,clamp(.18rem,.55vw,.42rem));
            row-gap:clamp(1.25rem,2.8vw,1.85rem);
        }
        .nine-system-matrix{
            grid-column:3;
            grid-row:1;
            position:relative;
            display:grid;
            grid-template-columns:repeat(var(--columns),var(--dot));
            gap:var(--gap);
            padding:.2rem;
        }
        .nine-system-matrix .dot{
            width:var(--dot);
        }
        .nine-system-matrix.is-eight{
            padding-right:clamp(2rem,3vw,2.65rem);
        }
        .nine-system-divider{
            grid-column:1 / -1;
            height:2px;
            margin:calc(var(--gap) * -.18) 0;
            border-radius:999px;
            background:rgba(148,163,184,.34);
        }
        .nine-system-divider.is-dashed{
            height:3px;
            background:repeating-linear-gradient(90deg,rgba(22,101,52,.82) 0 .42rem,transparent .42rem .72rem);
        }
        .nine-system-divider.is-strong{
            background:rgba(14,116,144,.62);
        }
        .eight-known-note{
            position:absolute;
            top:calc(var(--dot) + (var(--gap) * .55));
            left:100%;
            color:rgba(2,6,23,.78);
            font-size:clamp(.85rem,1.65vw,1.25rem);
            font-weight:520;
            line-height:1;
            letter-spacing:-.04em;
            pointer-events:none;
        }
        .nine-brace{
            width:clamp(1.18rem,2.1vw,1.72rem);
            height:100%;
            color:#0e7490;
            overflow:visible;
        }
        .nine-brace path{
            fill:none;
            stroke:currentColor;
            stroke-width:2.4;
            stroke-linecap:round;
            stroke-linejoin:round;
            vector-effect:non-scaling-stroke;
        }
        .nine-brace.is-left{
            grid-column:2;
            align-self:stretch;
            margin-right:var(--brace-nudge,0);
        }
        .nine-brace.is-right{
            grid-column:4;
            align-self:stretch;
            margin-left:var(--brace-nudge,0);
            transform:scaleX(-1);
        }
        .nine-brace.is-nine{
            grid-row:1;
            align-self:start;
        }
        .nine-brace.is-ten{
            grid-row:1;
            align-self:start;
        }
        .nine-system-label{
            color:#020617;
            font-size:clamp(1.9rem,3.4vw,2.95rem);
            font-weight:430;
            line-height:1;
            letter-spacing:-.055em;
            white-space:nowrap;
        }
        .nine-system-label.is-left{
            grid-column:1;
            grid-row:1;
            align-self:start;
            display:grid;
            margin-right:var(--label-nudge,0);
            place-items:center;
        }
        .nine-system-label.is-right{
            grid-column:5;
            grid-row:1;
            align-self:start;
            display:grid;
            margin-left:var(--label-nudge,0);
            place-items:center;
        }
        .nine-system-equation{
            grid-column:1 / -1;
            grid-row:2;
            color:#020617;
            font-size:clamp(3.7rem,7vw,5.8rem);
            font-weight:430;
            line-height:1;
            letter-spacing:-.055em;
            white-space:nowrap;
        }

        .start-screen{
            display:grid;
            width:100%;
            max-width:62rem;
            justify-items:center;
            gap:1.15rem;
            text-align:center;
        }
        .start-screen h2{
            margin:0;
            color:var(--ink);
            font-size:clamp(2.3rem,5vw,4rem);
            font-weight:650;
            line-height:1;
            letter-spacing:-.055em;
        }
        .technique-grid{
            display:grid;
            width:min(100%,34rem);
            gap:1rem;
            padding:1rem;
            border-radius:1.5rem;
            background:rgba(255,255,255,.7);
            box-shadow:0 18px 50px -42px rgba(15,23,42,.62), inset 0 0 0 1px rgba(255,255,255,.8);
        }
        .technique-grid.is-start{
            width:min(100%,58rem);
            grid-template-columns:repeat(3,minmax(0,1fr));
            align-items:stretch;
        }
        .technique-group{
            display:grid;
            gap:.62rem;
            border:1px solid rgba(14,116,144,.18);
            border-radius:1.05rem;
            background:linear-gradient(145deg,rgba(255,255,255,.76),rgba(248,252,253,.58));
            padding:.72rem;
            box-shadow:0 14px 34px -30px rgba(14,116,144,.42), inset 0 1px 0 rgba(255,255,255,.92);
        }
        .technique-grid.is-start .technique-group{
            align-content:start;
        }
        .technique-group + .technique-group{
            margin-top:.18rem;
        }
        .technique-grid.is-start .technique-group + .technique-group{
            margin-top:0;
        }
        .technique-group-title{
            margin:0;
            color:#64748b;
            font-size:.66rem;
            font-weight:760;
            letter-spacing:.14em;
            text-transform:uppercase;
            text-align:left;
        }
        .technique-group-buttons{
            display:grid;
            grid-template-columns:repeat(2,minmax(0,1fr));
            gap:.55rem;
        }
        .family-button.is-active{
            background:linear-gradient(135deg,#0891b2,#14b8a6);
            color:white;
            border-color:transparent;
            box-shadow:0 18px 34px -24px rgba(8,145,178,.95);
        }

        @media (max-width:1080px){
            .technique-grid.is-start{
                grid-template-columns:repeat(2,minmax(0,1fr));
            }
            .phase-stage.is-final{
                grid-template-columns:1fr;
                max-width:44rem;
            }
            .phase-stage.is-final .phase-copy{
                justify-items:center;
                text-align:center;
            }
            .calc-expression.is-result{ justify-content:center; }
            .subtract-note{
                right:.86rem;
                top:47%;
                bottom:auto;
                transform:translateY(-50%);
                font-size:.96rem;
            }
            .table-arrow{
                right:2.1rem;
                top:50%;
                bottom:auto;
                width:1.22rem;
                height:2.75rem;
                transform:translateY(-50%);
            }
        }
        @media (max-width:900px){
            .technique-grid.is-start{
                grid-template-columns:1fr;
            }
            .phase-stage.is-two{
                grid-template-columns:1fr;
                max-width:42rem;
            }
            .dot-matrix{
                --dot:min(8.2vw,2.35rem);
                --gap:.28rem;
            }
            .phase-stage.is-final .dot-matrix{
                --dot:min(7vw,1.9rem);
                --gap:.2rem;
            }
            .nine-system-stage{
                min-height:27rem;
            }
            .nine-system-visual{
                --dot:min(6.3vw,1.75rem);
                --gap:.21rem;
                width:min(100%,35rem);
                grid-template-columns:auto auto auto auto auto;
                column-gap:var(--system-column-gap,.18rem);
                row-gap:1.35rem;
            }
            .nine-system-label{
                font-size:clamp(1.22rem,5vw,2rem);
            }
            .nine-system-equation{
                font-size:clamp(3rem,12vw,4.7rem);
            }
        }
    </style>
</head>
<body>
    <div id="multi-app" class="multi-app relative overflow-hidden">
        <main class="relative z-10 mx-auto flex min-h-screen w-full max-w-7xl flex-col px-4 py-4 sm:px-6 lg:px-8">
            <header class="rounded-[1.85rem] border border-white/80 bg-white/78 p-4 shadow-[0_24px_70px_-45px_rgba(15,23,42,0.65)] backdrop-blur sm:p-5">
                <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                    <div>
                        <a href="#" onclick="event.preventDefault()" class="inline-flex items-center text-sm font-medium text-slate-500 transition hover:text-emerald-700">← Volver a 4° Básico</a>
                        <div class="mt-3 flex items-center gap-4">
                            <img src="calcumat-hands-bg.png" alt="Calcumat" class="h-12 w-20 object-contain drop-shadow-[0_14px_20px_rgba(15,23,42,.10)]">
                            <span class="hidden h-9 w-px bg-slate-200 sm:block"></span>
                            <span class="rounded-3xl border border-emerald-100 bg-white/90 px-4 py-2 text-xs font-semibold uppercase tracking-[0.16em] text-emerald-700 shadow-[0_16px_34px_-28px_rgba(15,23,42,0.45)]">Calcumat 4°</span>
                        </div>
                    </div>
                    <div class="max-w-2xl lg:text-right">
                        <h1 class="text-3xl font-semibold tracking-[-0.04em] text-[#06233f] sm:text-4xl">Técnicas para multiplicar</h1>
                        <p class="mt-2 max-w-2xl text-sm leading-6 text-slate-600 sm:text-[0.95rem] lg:ml-auto">Usa multiplicaciones conocidas para calcular otras relacionadas.</p>
                    </div>
                </div>
            </header>

            <section id="content-section" class="mt-4 grid flex-1 gap-4 xl:grid-cols-[1fr_17rem]">
                <div class="rounded-[2rem] border border-white/80 bg-white/70 p-4 shadow-[0_24px_70px_-45px_rgba(15,23,42,0.62)] backdrop-blur">
                    <div class="flex flex-wrap items-center justify-between gap-3 rounded-[1.5rem] border border-white/80 bg-white/62 px-4 py-3 shadow-[0_18px_50px_-42px_rgba(15,23,42,.62)]">
                        <div>
                            <p class="text-[0.68rem] font-semibold uppercase tracking-[0.16em] text-emerald-700">Familia multiplicativa</p>
                            <h2 id="family-title" class="mt-0.5 text-xl font-semibold tracking-[-0.04em] text-[#06233f]">Familia 9 veces</h2>
                        </div>
                        <div id="progress-pill" class="rounded-2xl bg-slate-50 px-4 py-2 text-sm font-semibold text-slate-700 ring-1 ring-slate-100">Inicio</div>
                    </div>

                    <div id="workspace" class="multi-fade mt-4 grid min-h-[31rem] place-items-center rounded-[1.75rem] bg-[radial-gradient(circle_at_50%_40%,rgba(34,211,238,0.13),transparent_38%),linear-gradient(145deg,rgba(255,255,255,.82),rgba(255,255,255,.48))] p-4 ring-1 ring-white/80"></div>
                </div>

                <aside id="controls-panel" class="rounded-[2rem] border border-white/80 bg-white/72 p-4 shadow-[0_24px_70px_-45px_rgba(15,23,42,0.62)] backdrop-blur">
                    <div class="grid gap-3 xl:sticky xl:top-4">
                        <div class="rounded-[1.5rem] bg-white/76 p-3 ring-1 ring-white/80">
                            <p class="mb-2 text-[0.68rem] font-semibold uppercase tracking-[0.16em] text-slate-500">Elegir técnica</p>
                            <div id="side-family-buttons" class="technique-grid !w-full !bg-transparent !p-0 !shadow-none"></div>
                        </div>
                        <button id="next-btn" class="rounded-2xl bg-gradient-to-br from-cyan-600 to-teal-500 px-5 py-3 text-sm font-semibold text-white shadow-[0_16px_30px_-20px_rgba(8,145,178,0.9)] transition hover:-translate-y-0.5" type="button">Siguiente fase</button>
                        <button id="reset-btn" class="rounded-2xl bg-white px-5 py-3 text-sm font-semibold text-emerald-700 ring-1 ring-emerald-100 transition hover:bg-emerald-50" type="button">Volver al inicio</button>
                    </div>
                </aside>
            </section>
        </main>
    </div>

    <script>
        (() => {
            const workspace = document.getElementById('workspace');
            const contentSection = document.getElementById('content-section');
            const progressPill = document.getElementById('progress-pill');
            const familyTitle = document.getElementById('family-title');
            const controlsPanel = document.getElementById('controls-panel');
            const sideFamilyButtons = document.getElementById('side-family-buttons');
            const nextBtn = document.getElementById('next-btn');
            const resetBtn = document.getElementById('reset-btn');
            const phases = ['known', 'knownVerified', 'target', 'system'];
            function easyTechnique(family, label, knownMessage) {
                return {
                    family,
                    knownFamily: family,
                    factors: [2,3,4,5,6,7,8,9],
                    label,
                    knownMessage,
                    operation: 'easy',
                    phases: ['known', 'system'],
                    phaseButtons: ['Verificar', 'Siguiente ejercicio'],
                    rows: { known: family, target: family, added: [] },
                    strategy(exercise) {
                        return {
                            known: exercise.targetResult,
                            target: exercise.targetResult,
                        };
                    },
                };
            }
            const techniques = {
                2: easyTechnique(2, '2 veces', 'Doblar es una multiplicación fácil.'),
                3: {
                    family: 3,
                    knownFamily: 2,
                    factors: [2,3,4,5,6,7,8,9],
                    label: '3 veces',
                    knownMessage: '¡Doblar es fácil!',
                    operation: '+',
                    tableDirection: 'down',
                    phaseButtons: ['Siguiente fase', 'Siguiente fase', 'Verificar', 'Siguiente ejercicio'],
                    rows: { known: 2, target: 3, added: [3] },
                    dividerAfter: 2,
                    strategy(exercise) {
                        return {
                            known: exercise.knownResult,
                            adjustment: exercise.factor,
                            target: exercise.targetResult,
                        };
                    },
                },
                4: {
                    family: 4,
                    knownFamily: 2,
                    factors: [2,3,4,5,6,7,8,9],
                    label: '4 veces',
                    knownMessage: '¡Este es un cálculo fácil!',
                    operation: 'double',
                    tableDirection: 'down',
                    phaseButtons: ['Siguiente fase', 'Siguiente fase', 'Verificar', 'Siguiente ejercicio'],
                    rows: { known: 2, target: 4, added: [3,4] },
                    dividerAfter: 2,
                    strategy(exercise) {
                        return {
                            known: exercise.knownResult,
                            adjustment: '×2',
                            target: exercise.targetResult,
                        };
                    },
                },
                5: easyTechnique(5, '5 veces', 'Multiplicar por 5 es una multiplicación fácil.'),
                6: {
                    family: 6,
                    knownFamily: 5,
                    factors: [2,3,4,5,6,7,8,9],
                    label: '6 veces',
                    knownMessage: '¡Multiplicar por 5 es fácil!',
                    operation: '+',
                    tableDirection: 'down',
                    phaseButtons: ['Siguiente fase', 'Siguiente fase', 'Verificar', 'Siguiente ejercicio'],
                    rows: { known: 5, target: 6, added: [6] },
                    strategy(exercise) {
                        return {
                            known: exercise.knownResult,
                            adjustment: exercise.factor,
                            target: exercise.targetResult,
                        };
                    },
                },
                7: {
                    family: 7,
                    knownFamily: 5,
                    factors: [2,3,4,5,6,7,8,9],
                    label: '7 veces',
                    knownMessage: '¡Multiplicar por 5 es fácil!',
                    operation: '+',
                    tableDirection: 'down',
                    phaseButtons: ['Siguiente fase', 'Siguiente fase', 'Verificar', 'Siguiente ejercicio'],
                    rows: { known: 5, target: 7, added: [6,7] },
                    tableSteps: [5,6,7],
                    strategy(exercise) {
                        return {
                            known: exercise.knownResult,
                            adjustment: 2 * exercise.factor,
                            adjustmentParts: [exercise.factor, exercise.factor],
                            target: exercise.targetResult,
                        };
                    },
                },
                8: {
                    family: 8,
                    knownFamily: 2,
                    factors: [2,3,4,5,6,7,8,9],
                    label: '8 veces',
                    knownMessage: '¡Este es un cálculo fácil!',
                    operation: 'double',
                    tableDirection: 'down',
                    phaseButtons: ['Siguiente fase', 'Siguiente fase', 'Verificar', 'Siguiente ejercicio'],
                    rows: { known: 2, target: 8, added: [3,4,5,6,7,8] },
                    dividerAfter: 2,
                    tableSteps: [2,4,8],
                    buildVisual: 'double-sections',
                    hideSystemTable: true,
                    strategy(exercise) {
                        return {
                            known: exercise.knownResult,
                            target: exercise.targetResult,
                            doubleLines: [
                                { family: 4, reference: exercise.knownResult },
                                { family: 8, reference: 4 * exercise.factor },
                            ],
                        };
                    },
                },
                9: {
                    family: 9,
                    knownFamily: 10,
                    factors: [2,3,4,5,6,7,8,9],
                    label: '9 veces',
                    knownMessage: '¡Multiplicar por 10 es fácil!',
                    operation: '−',
                    tableDirection: 'up',
                    phaseButtons: ['Verificar', 'Siguiente fase', 'Verificar', 'Siguiente ejercicio'],
                    rows: { known: 10, target: 9, added: [] },
                    strategy(exercise) {
                        return {
                            known: exercise.knownResult,
                            adjustment: exercise.factor,
                            target: exercise.targetResult,
                        };
                    },
                },
                10: easyTechnique(10, '10 veces', 'Multiplicar por 10 es una multiplicación fácil.'),
            };
            let selectedTechniqueKey = 9;
            let technique = techniques[selectedTechniqueKey];
            let started = false;
            let phaseIndex = 0;
            let exerciseDeck = [];
            let currentExercise = null;

            function shuffle(items) {
                const shuffled = [...items];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }

            function buildExercises(config) {
                return config.factors.map(factor => ({
                    factor,
                    columns: factor,
                    knownFamily: config.knownFamily,
                    targetFamily: config.family,
                    knownResult: config.knownFamily * factor,
                    targetResult: config.family * factor,
                }));
            }

            function resetExerciseDeck() {
                exerciseDeck = shuffle(buildExercises(technique));
            }

            function drawExercise() {
                if (!exerciseDeck.length) resetExerciseDeck();
                currentExercise = exerciseDeck.shift();
                phaseIndex = 0;
            }

            function activePhases() {
                return technique.phases || phases;
            }

            function matrixHtml(filledRows, fadeEmpty = false, addedRows = []) {
                const columns = currentExercise?.columns || 8;
                const addedSet = new Set(addedRows);
                const dividerAfter = technique.dividerAfter || 5;
                let html = `<div class="dot-matrix" style="--columns:${columns}" aria-hidden="true">`;
                for (let row = 1; row <= 10; row++) {
                    for (let col = 1; col <= columns; col++) {
                        const filled = row <= filledRows;
                        const cls = addedSet.has(row)
                            ? 'is-added'
                            : filled
                                ? 'is-filled'
                                : `is-empty${fadeEmpty ? ' opacity-70' : ''}`;
                        html += `<span class="dot ${cls}"></span>`;
                    }
                    if (row === dividerAfter) html += '<span class="matrix-divider"></span>';
                }
                html += '</div>';
                return html;
            }

            function doubleBuildSectionHtml(rowClasses) {
                const columns = currentExercise?.columns || 8;
                let html = `<div class="progression-matrix" style="--columns:${columns}" aria-hidden="true">`;
                rowClasses.forEach(rowClass => {
                    for (let col = 1; col <= columns; col++) {
                        html += `<span class="dot ${rowClass}"></span>`;
                    }
                });
                html += '</div>';
                return html;
            }

            function doubleBuildVisualHtml() {
                return `
                    <div class="double-build-stack" aria-hidden="true">
                        ${doubleBuildSectionHtml(['is-filled','is-filled'])}
                        <div class="double-build-separator is-dashed"></div>
                        ${doubleBuildSectionHtml(['is-added','is-added'])}
                        <div class="double-build-separator"></div>
                        ${doubleBuildSectionHtml(['is-filled','is-filled','is-added','is-added','is-empty','is-empty'])}
                    </div>
                `;
            }

            function targetVisualHtml() {
                if (technique.buildVisual === 'double-sections') {
                    return doubleBuildVisualHtml();
                }

                return matrixHtml(technique.rows.target, true, technique.rows.added);
            }

            function usedRowsHeightStyle(rows) {
                const dotTerms = Array.from({ length: rows }, () => 'var(--dot)');
                const gapTerms = Array.from({ length: Math.max(rows - 1, 0) }, () => 'var(--gap)');
                return `height:calc(${[...dotTerms, ...gapTerms, '.4rem'].join(' + ')});`;
            }

            function usedRowsData(rows) {
                return `data-used-rows="${rows}"`;
            }

            function compactBraceStyle(columns) {
                if (columns <= 3) {
                    return '--system-column-gap:.32rem;--brace-nudge:-1rem;--label-nudge:0rem;';
                }

                if (columns <= 4) {
                    return '--system-column-gap:.36rem;--brace-nudge:-.68rem;--label-nudge:0rem;';
                }

                if (columns <= 5) {
                    return '--system-column-gap:.4rem;--brace-nudge:-.38rem;--label-nudge:0rem;';
                }

                return '';
            }

            function finalSystemConfig(ex) {
                if (selectedTechniqueKey === 3) {
                    const known = 2 * ex.factor;
                    const added = ex.factor;
                    return {
                        redRows: 2,
                        greenRows: 1,
                        leftRows: 3,
                        rightRows: 2,
                        leftLabel: `${known} + ${added}`,
                        rightLabel: known,
                        equation: `3 · ${ex.factor} = ${ex.targetResult}`,
                        aria: `Dos veces ${ex.factor} es ${known}; al agregar ${added} queda tres veces ${ex.factor} igual a ${ex.targetResult}`,
                    };
                }

                if (selectedTechniqueKey === 4) {
                    const known = 2 * ex.factor;
                    return {
                        redRows: 2,
                        greenRows: 2,
                        leftRows: 4,
                        rightRows: 2,
                        leftLabel: `2 · ${known}`,
                        rightLabel: known,
                        equation: `4 · ${ex.factor} = ${ex.targetResult}`,
                        aria: `Dos veces ${ex.factor} es ${known}; el doble de ${known} es cuatro veces ${ex.factor}, igual a ${ex.targetResult}`,
                    };
                }

                if (selectedTechniqueKey === 6) {
                    const known = 5 * ex.factor;
                    const added = ex.factor;
                    return {
                        redRows: 5,
                        greenRows: 1,
                        leftRows: 6,
                        rightRows: 5,
                        leftLabel: `${known} + ${added}`,
                        rightLabel: known,
                        equation: `6 · ${ex.factor} = ${ex.targetResult}`,
                        aria: `Cinco veces ${ex.factor} es ${known}; al agregar ${added} queda seis veces ${ex.factor} igual a ${ex.targetResult}`,
                    };
                }

                if (selectedTechniqueKey === 7) {
                    const known = 5 * ex.factor;
                    const added = 2 * ex.factor;
                    return {
                        redRows: 5,
                        greenRows: 2,
                        leftRows: 7,
                        rightRows: 5,
                        leftLabel: `${known} + ${added}`,
                        rightLabel: known,
                        equation: `7 · ${ex.factor} = ${ex.targetResult}`,
                        aria: `Cinco veces ${ex.factor} es ${known}; al agregar ${added} queda siete veces ${ex.factor} igual a ${ex.targetResult}`,
                    };
                }

            if (selectedTechniqueKey === 8) {
                    const firstDouble = 2 * ex.factor;
                    const secondDouble = 4 * ex.factor;
                    return {
                        matrixClass: 'is-eight',
                        rowClasses: [
                            'is-filled','is-filled',
                            'is-added','is-added',
                            'is-filled','is-filled',
                            'is-added','is-added',
                            'is-empty','is-empty',
                        ],
                        dividers: [
                            { after: 2, cls: 'is-dashed' },
                            { after: 4, cls: 'is-strong' },
                        ],
                        innerLabel: firstDouble,
                        leftRows: 8,
                        rightRows: 4,
                        leftLabel: `2 · ${secondDouble}`,
                        rightLabel: secondDouble,
                        equation: `8 · ${ex.factor} = ${ex.targetResult}`,
                        aria: `Dos veces ${ex.factor} es ${firstDouble}; el doble de ${firstDouble} es ${secondDouble}; el doble de ${secondDouble} es ocho veces ${ex.factor}, igual a ${ex.targetResult}`,
                    };
                }

                return {
                    redRows: 9,
                    greenRows: 0,
                    leftRows: 9,
                    rightRows: 10,
                    leftLabel: `${ex.knownResult} − ${ex.factor}`,
                    rightLabel: ex.knownResult,
                    equation: `9 · ${ex.factor} = ${ex.targetResult}`,
                    aria: `Diez veces ${ex.factor} es ${ex.knownResult}; al quitar un grupo de ${ex.factor} queda nueve veces ${ex.factor} igual a ${ex.targetResult}`,
                };
            }

            function nineBraceHtml(extraClass, rows) {
                return `
                    <svg class="nine-brace ${extraClass}" ${usedRowsData(rows)} style="${usedRowsHeightStyle(rows)}" viewBox="0 0 34 240" preserveAspectRatio="none" aria-hidden="true">
                        <path d="M28 3 C9 3 9 16 9 30 L9 92 C9 112 3 116 3 120 C3 124 9 128 9 148 L9 210 C9 224 9 237 28 237"></path>
                    </svg>
                `;
            }

            function nineSystemMatrixHtml(config) {
                const columns = currentExercise?.columns || 9;
                const dividers = config.dividers || (config.greenRows > 0 ? [{ after: config.redRows, cls: '' }] : []);
                let html = `<div class="nine-system-matrix ${config.matrixClass || ''}" style="--columns:${columns}" aria-hidden="true">`;
                for (let row = 1; row <= 10; row++) {
                    for (let col = 1; col <= columns; col++) {
                        const cls = config.rowClasses
                            ? config.rowClasses[row - 1]
                            : row <= config.redRows
                                ? 'is-filled'
                                : row <= config.redRows + config.greenRows
                                    ? 'is-added'
                                    : 'is-empty';
                        html += `<span class="dot ${cls}"></span>`;
                    }
                    const divider = dividers.find(item => item.after === row);
                    if (divider) {
                        html += `<span class="nine-system-divider ${divider.cls}"></span>`;
                    }
                }
                if (config.innerLabel) {
                    html += `<span class="eight-known-note">${config.innerLabel}</span>`;
                }
                html += '</div>';
                return html;
            }

            function renderNineSystem() {
                const ex = currentExercise;
                const config = finalSystemConfig(ex);
                return `
                    <div class="nine-system-stage" aria-label="${config.aria}">
                        <div class="nine-system-visual" style="${compactBraceStyle(ex.factor)}">
                            <span class="nine-system-label is-left" ${usedRowsData(config.leftRows)} style="${usedRowsHeightStyle(config.leftRows)}">${config.leftLabel}</span>
                            ${nineBraceHtml('is-left is-nine', config.leftRows)}
                            ${nineSystemMatrixHtml(config)}
                            ${nineBraceHtml('is-right is-ten', config.rightRows)}
                            <span class="nine-system-label is-right" ${usedRowsData(config.rightRows)} style="${usedRowsHeightStyle(config.rightRows)}">${config.rightLabel}</span>
                            <div class="nine-system-equation">${config.equation}</div>
                        </div>
                    </div>
                `;
            }

            function syncFinalSystemBraceHeights() {
                const matrix = workspace.querySelector('.nine-system-matrix');
                if (!matrix) return;

                const dot = matrix.querySelector('.dot');
                if (!dot) return;

                const dots = [...matrix.querySelectorAll('.dot')];
                const columns = Math.max(dots.length / 10, 1);
                const matrixRect = matrix.getBoundingClientRect();
                const matrixStyle = window.getComputedStyle(matrix);
                const paddingBottom = parseFloat(matrixStyle.paddingBottom) || 0;

                workspace.querySelectorAll('[data-used-rows]').forEach(element => {
                    const rows = Number(element.dataset.usedRows);
                    if (!rows) return;

                    const lastDot = dots[(rows * columns) - 1];
                    if (!lastDot) return;

                    const height = lastDot.getBoundingClientRect().bottom
                        - matrixRect.top
                        + paddingBottom;
                    element.style.height = `${height}px`;
                });

                const innerNote = matrix.querySelector('.eight-known-note');
                if (!innerNote) return;

                const firstRowLastDot = dots[columns - 1];
                const secondRowFirstDot = dots[columns];
                if (!firstRowLastDot || !secondRowFirstDot) return;

                innerNote.style.left = '0px';
                innerNote.style.top = '0px';

                const noteRect = innerNote.getBoundingClientRect();
                const dotRect = firstRowLastDot.getBoundingClientRect();
                const secondRowRect = secondRowFirstDot.getBoundingClientRect();
                const minLeft = dotRect.right - matrixRect.left + 4;
                const maxLeft = matrixRect.width - noteRect.width - 4;
                const centeredLeft = ((dotRect.right + matrixRect.right) / 2) - matrixRect.left - (noteRect.width / 2);
                const left = maxLeft >= minLeft
                    ? Math.max(minLeft, Math.min(centeredLeft, maxLeft))
                    : maxLeft;
                const top = ((dotRect.bottom + secondRowRect.top) / 2) - matrixRect.top - (noteRect.height / 2);

                innerNote.style.left = `${left}px`;
                innerNote.style.top = `${top}px`;
            }

            function tableHtml() {
                const ex = currentExercise;
                const isAdd = technique.operation === '+';
                const isDouble = technique.operation === 'double';
                const stepFamilies = technique.tableSteps || (isAdd || isDouble ? [ex.knownFamily, ex.targetFamily] : [ex.targetFamily, ex.knownFamily]);
                const rows = stepFamilies.map(family => ({
                    family,
                    result: family * ex.factor,
                    cls: family === ex.targetFamily ? 'is-target' : 'is-known',
                }));
                const firstRow = isAdd || isDouble
                    ? { family: ex.knownFamily, result: ex.knownResult, cls: 'is-known' }
                    : { family: ex.targetFamily, result: ex.targetResult, cls: 'is-target' };
                const secondRow = isAdd || isDouble
                    ? { family: ex.targetFamily, result: ex.targetResult, cls: 'is-target' }
                    : { family: ex.knownFamily, result: ex.knownResult, cls: 'is-known' };
                const arrowPath = isAdd || isDouble
                    ? '<path d="M20 10 C27 27 22 43 9 48"></path><polygon points="9,48 22,50 14,37"></polygon>'
                    : '<path d="M20 48 C27 31 22 15 9 10"></path><polygon points="9,10 22,8 14,21"></polygon>';
                const useProgressiveTable = (isAdd || isDouble) && rows.length > 2;
                const modifierClass = isDouble ? 'is-double' : isAdd ? 'is-add' : '';
                const noteText = isDouble ? '×2' : `${technique.operation}${ex.factor}`;

                if (useProgressiveTable) {
                    return `
                        <aside class="family-table" aria-label="Tabla de multiplicaciones por ${ex.factor}">
                            <div class="related-rows ${modifierClass} has-three">
                                ${rows.map(row => `
                                    <div class="table-row ${row.cls}">
                                        <div class="table-cell">${row.family} · ${ex.factor} =</div>
                                        <div class="table-cell">${row.result}</div>
                                    </div>
                                `).join('')}
                                <svg class="table-arrow ${modifierClass} step-one" viewBox="0 0 30 58" aria-hidden="true">${arrowPath}</svg>
                                <span class="subtract-note ${modifierClass} step-one">${noteText}</span>
                                <svg class="table-arrow ${modifierClass} step-two" viewBox="0 0 30 58" aria-hidden="true">${arrowPath}</svg>
                                <span class="subtract-note ${modifierClass} step-two">${noteText}</span>
                            </div>
                        </aside>
                    `;
                }

                return `
                    <aside class="family-table" aria-label="Tabla de multiplicaciones por ${ex.factor}">
                        <div class="related-rows ${isAdd ? 'is-add' : ''}">
                            <div class="table-row ${firstRow.cls}">
                                <div class="table-cell">${firstRow.family} · ${ex.factor} =</div>
                                <div class="table-cell">${firstRow.result}</div>
                            </div>
                            <div class="table-row ${secondRow.cls}"><div class="table-cell">${secondRow.family} · ${ex.factor} =</div><div class="table-cell">${secondRow.result}</div></div>
                            <svg class="table-arrow ${modifierClass}" viewBox="0 0 30 58" aria-hidden="true">${arrowPath}</svg>
                            <span class="subtract-note ${modifierClass}">${noteText}</span>
                        </div>
                    </aside>
                `;
            }

            function systemExpressionHtml(ex, strategy) {
                if (technique.operation === 'double') {
                    const lines = strategy.doubleLines || [{ family: ex.targetFamily, reference: strategy.known }];
                    return lines.map(line => `
                        <span class="system-expression"><span class="big">${line.family} · ${ex.factor}</span><span>→</span><span class="big is-phrase">el doble de ${line.reference}</span></span>
                    `).join('');
                }

                const adjustmentParts = strategy.adjustmentParts || [strategy.adjustment];
                const adjustmentHtml = adjustmentParts.map(value => `<span class="big ${technique.operation === '+' ? 'plus' : 'minus'}">${technique.operation} ${value}</span>`).join('');
                return `<span class="system-expression"><span class="big">${ex.targetFamily} · ${ex.factor}</span><span>→</span><span class="big">${strategy.known}</span>${adjustmentHtml}</span>`;
            }

            function renderFamilyButtons() {
                const buttonHtml = family => `
                    <button type="button" data-technique="${family}" class="family-button rounded-2xl border border-slate-100 bg-white px-3 py-2 text-sm font-semibold text-slate-600 transition ${family === selectedTechniqueKey ? 'is-active' : ''} ${techniques[family] ? '' : 'opacity-60'}" ${techniques[family] ? '' : 'disabled'}>
                        ${family} veces
                    </button>
                `;
                const groups = [
                    { title: 'Multiplicaciones fáciles', families: [2,5,10] },
                    { title: 'Agregar o quitar grupos', families: [3,6,7,9] },
                    { title: 'Aplicar dobles', families: [4,8] },
                ];

                return groups.map(group => `
                    <div class="technique-group">
                        <p class="technique-group-title">${group.title}</p>
                        <div class="technique-group-buttons">
                            ${group.families.map(buttonHtml).join('')}
                        </div>
                    </div>
                `).join('');
            }

            function bindTechniqueButtons(scope, options = {}) {
                scope.querySelectorAll('[data-technique]').forEach(button => {
                    button.addEventListener('click', () => {
                        selectedTechniqueKey = Number(button.dataset.technique);
                        technique = techniques[selectedTechniqueKey];
                        started = Boolean(options.startOnSelect);
                        phaseIndex = 0;
                        currentExercise = null;
                        resetExerciseDeck();
                        if (started) drawExercise();
                        render();
                    });
                });
            }

            function renderStart() {
                return `
                    <div class="start-screen">
                        <img src="calcumat-hands-bg.png" alt="Calcumat" class="h-20 w-32 object-contain drop-shadow-[0_14px_20px_rgba(15,23,42,.10)]">
                        <h2>Técnicas para multiplicar</h2>
                        <div class="technique-grid is-start" aria-label="Selección de técnica">
                            ${renderFamilyButtons()}
                        </div>
                        <button id="start-btn" class="rounded-2xl bg-gradient-to-br from-cyan-600 to-teal-500 px-7 py-3 text-base font-semibold text-white shadow-[0_16px_30px_-20px_rgba(8,145,178,0.9)] transition hover:-translate-y-0.5" type="button">
                            Iniciar ejercicio
                        </button>
                    </div>
                `;
            }

            function renderKnown() {
                const ex = currentExercise;
                return `
                    <div class="phase-stage is-two">
                        <div class="phase-copy">
                            <div>
                                <h2 class="phase-question">¿Cuánto es ${ex.knownFamily} veces ${ex.factor}?</h2>
                            </div>
                            <div class="calc-expression" aria-label="${ex.knownFamily} veces ${ex.factor}"><span>${ex.knownFamily}</span><span>·</span><span>${ex.factor}</span></div>
                        </div>
                        <div class="grid place-items-center">
                            ${matrixHtml(technique.rows.known)}
                        </div>
                    </div>
                `;
            }

            function renderKnownVerified() {
                const ex = currentExercise;
                return `
                    <div class="phase-stage is-two">
                        <div class="phase-copy">
                            <div class="calc-expression is-known-result" aria-label="${ex.knownFamily} veces ${ex.factor} igual a ${ex.knownResult}"><span>${ex.knownFamily}</span><span>·</span><span>${ex.factor}</span><span>=</span><strong>${ex.knownResult}</strong></div>
                            <p class="phase-intro text-emerald-700">${technique.knownMessage}</p>
                        </div>
                        <div class="grid place-items-center">
                            ${matrixHtml(technique.rows.known)}
                        </div>
                    </div>
                `;
            }

            function renderTarget() {
                const ex = currentExercise;
                return `
                    <div class="phase-stage is-two">
                        <div class="phase-copy">
                            <div>
                                <p class="phase-intro">Si ${ex.knownFamily} veces ${ex.factor} es ${ex.knownResult},</p>
                                <h2 class="phase-question">¿Cuánto es ${ex.targetFamily} veces ${ex.factor}?</h2>
                            </div>
                            <div class="calc-expression" aria-label="${ex.targetFamily} veces ${ex.factor}"><span>${ex.targetFamily}</span><span>·</span><span>${ex.factor}</span></div>
                        </div>
                        <div class="grid place-items-center">
                            ${targetVisualHtml()}
                        </div>
                    </div>
                `;
            }

            function renderSystem() {
                if (technique.operation === 'easy') {
                    const ex = currentExercise;
                    return `
                        <div class="phase-stage is-two">
                            <div class="phase-copy">
                                <div class="calc-expression is-known-result" aria-label="${ex.targetFamily} veces ${ex.factor} igual a ${ex.targetResult}">
                                    <span>${ex.targetFamily}</span><span>·</span><span>${ex.factor}</span><span>=</span><strong>${ex.targetResult}</strong>
                                </div>
                                <p class="phase-intro text-emerald-700">${technique.knownMessage}</p>
                            </div>
                            <div class="grid place-items-center">
                                ${matrixHtml(technique.rows.target)}
                            </div>
                        </div>
                    `;
                }

                if ([3, 4, 6, 7, 8, 9].includes(selectedTechniqueKey)) {
                    return renderNineSystem();
                }

                const ex = currentExercise;
                const strategy = technique.strategy(ex);
                return `
                    <div class="phase-stage is-final">
                        <div class="phase-copy">
                            <div class="calc-expression is-result" aria-label="${ex.targetFamily} veces ${ex.factor} igual a ${ex.targetResult}">
                                <span>${ex.targetFamily}</span><span>·</span><span>${ex.factor}</span><span>=</span><strong>${ex.targetResult}</strong>
                            </div>
                            <div class="system-card" aria-label="Sistematización de la técnica">
                                <p class="system-step">
                                    <span class="system-label">Si sé que</span>
                                    <span class="big">${ex.knownFamily} · ${ex.factor} = ${strategy.known}</span>
                                </p>
                                <p class="system-step">
                                    <span class="system-label">Entonces</span>
                                    ${systemExpressionHtml(ex, strategy)}
                                </p>
                            </div>
                        </div>
                        <div class="matrix-stack ${technique.buildVisual ? 'has-progression' : ''}">
                            ${targetVisualHtml()}
                            ${technique.hideSystemTable ? '' : tableHtml()}
                        </div>
                    </div>
                `;
            }

            function render() {
                workspace.classList.remove('multi-fade');
                void workspace.offsetWidth;
                workspace.classList.add('multi-fade');

                controlsPanel.classList.toggle('hidden', !started);
                contentSection.style.gridTemplateColumns = started ? '' : '1fr';
                familyTitle.textContent = `Familia ${technique.label}`;
                sideFamilyButtons.innerHTML = renderFamilyButtons();
                bindTechniqueButtons(sideFamilyButtons, { startOnSelect: true });

                if (!started) {
                    progressPill.textContent = 'Inicio';
                    workspace.innerHTML = renderStart();
                    bindTechniqueButtons(workspace);
                    workspace.querySelector('#start-btn').addEventListener('click', () => {
                        started = true;
                        resetExerciseDeck();
                        drawExercise();
                        render();
                    });
                    return;
                }

                const phaseList = activePhases();
                const phase = phaseList[phaseIndex];
                progressPill.textContent = `Fase ${phaseIndex + 1} de ${phaseList.length}`;
                nextBtn.textContent = technique.phaseButtons[phaseIndex];
                workspace.innerHTML = phase === 'known'
                    ? renderKnown()
                    : phase === 'knownVerified'
                        ? renderKnownVerified()
                        : phase === 'target'
                            ? renderTarget()
                            : renderSystem();
                syncFinalSystemBraceHeights();
            }

            nextBtn.addEventListener('click', () => {
                if (phaseIndex === activePhases().length - 1) {
                    drawExercise();
                } else {
                    phaseIndex++;
                }
                render();
            });

            resetBtn.addEventListener('click', () => {
                started = false;
                phaseIndex = 0;
                currentExercise = null;
                resetExerciseDeck();
                render();
            });

            window.addEventListener('resize', syncFinalSystemBraceHeights);

            render();
        })();
    </script>
</body>
</html>
